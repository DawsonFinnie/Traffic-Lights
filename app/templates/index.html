<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traffic Light Simulator</title>
    <style>
        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaa;
        }

        .light-housing {
            background: #222;
            border: 4px solid #444;
            border-radius: 20px;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }

        .bulb {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #333;   /* dim/off state */
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        /* Active (lit) states */
        .bulb.red-on {
            background: #ff2200;
            box-shadow: 0 0 30px #ff2200, 0 0 60px #ff220088;
        }

        .bulb.yellow-on {
            background: #ffcc00;
            box-shadow: 0 0 30px #ffcc00, 0 0 60px #ffcc0088;
        }

        .bulb.green-on {
            background: #00cc44;
            box-shadow: 0 0 30px #00cc44, 0 0 60px #00cc4488;
        }

        #status-label {
            margin-top: 24px;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: bold;
            min-height: 1.5em;

        }


        #toggle-btn {
            margin-top: 20px;
            padding: 12px 40px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #cc0000;
            color: white;
            transition: background 0.3s ease;

        }
    </style>
</head>
<body>
    <h1>Traffic Light Simulator</h1>

    <div class="light-housing">
        <div class="bulb" id="bulb-red"></div>
        <div class="bulb" id="bulb-yellow"></div>
        <div class="bulb" id="bulb-green"></div>
    </div>

    <div id="status-label">Connecting...</div>
    <button id="toggle-btn">Stop</button>

    <script src="/static/js/traffic.js"></script>
</body>
</html>
